name: Daily Financial Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    environment: cron
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Execute script
        run: node --import tsx daily-financial-report/index.ts
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          URL_BACKEND: ${{ secrets.URL_BACKEND }}
          CRON_API_KEY: ${{ secrets.CRON_API_KEY }}
